<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진믹스 - 내 외계인들</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; overflow: hidden; height: 100vh; background: linear-gradient(160deg, #e8f5e9 0%, #f3e5f5 50%, #e3f2fd 100%); }

        /* 헤더 */
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(102,187,106,0.3);
            padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-title { font-size: 16px; font-weight: bold; color: #1F7A4D; display: flex; align-items: center; gap: 6px; }
        .header-count { font-size: 13px; color: #888; }
        .home-btn { padding: 7px 14px; background: #1F7A4D; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .home-btn:hover { background: #43a047; }

        /* 무대 */
        #stage { position: fixed; top: 54px; left: 0; right: 0; bottom: 0; }

        /* 걸어다니는 외계인 */
        .walking-alien {
            position: absolute;
            cursor: pointer;
            user-select: none;
            transition: filter 0.2s;
        }
        .walking-alien:hover { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25)); }
        .walking-alien.selected { filter: drop-shadow(0 0 12px #66bb6a); }

        .alien-body-wrap { transition: transform 0.3s; }

        /* 둥실둥실 애니메이션 */
        .alien-float {
            animation: float var(--dur, 2.2s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-8px); }
        }

        /* 캐릭터 파츠 */
        .char-stage { position: relative; width: 65px; height: 65px; }
        .part { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .c-body, .c-head { -webkit-mask-size:contain;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:contain;mask-repeat:no-repeat;mask-position:center;z-index:1; }
        .c-head { z-index: 2; }
        .c-eyes { z-index: 3; object-fit: contain; }

        /* 이름 태그 */
        .alien-label {
            text-align: center; font-size: 11px; color: #555;
            background: rgba(255,255,255,0.85); border-radius: 8px;
            padding: 2px 6px; margin-top: 2px;
            white-space: nowrap; max-width: 80px; overflow: hidden; text-overflow: ellipsis;
        }

        /* 정보 패널 */
        .info-panel {
            position: fixed; bottom: -120px; left: 0; right: 0; z-index: 300;
            background: white; border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            padding: 16px 20px 24px;
            transition: bottom 0.35s cubic-bezier(0.34,1.56,0.64,1);
            display: flex; align-items: center; gap: 16px;
        }
        .info-panel.open { bottom: 0; }
        .info-char { position: relative; width: 70px; height: 70px; flex-shrink: 0; background: transparent; }
        .info-char .part { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .info-char .c-body, .info-char .c-head { -webkit-mask-size:contain;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:contain;mask-repeat:no-repeat;mask-position:center;z-index:1; }
        .info-char .c-head { z-index: 2; }
        .info-char .c-eyes { z-index: 3; object-fit: contain; }
        .info-text h3 { font-size: 18px; color: #1F7A4D; margin-bottom: 4px; }
        .info-text p  { font-size: 13px; color: #888; margin: 0; }
        .info-close { margin-left: auto; padding: 8px 14px; background: #f0f0f0; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; color: #555; flex-shrink: 0; }

        /* 빈 상태 */
        #emptyState {
            display: none; position: fixed; top: 54px; left: 0; right: 0; bottom: 0;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 14px; text-align: center; padding: 30px;
        }
        #emptyState .empty-emoji { font-size: 60px; }
        #emptyState h2 { font-size: 20px; color: #555; }
        #emptyState p  { font-size: 14px; color: #999; line-height: 1.6; }
        .play-btn { padding: 12px 28px; background: linear-gradient(135deg,#66bb6a,#43a047); color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">🐾 내 외계인들</div>
        <div class="header-count" id="headerCount"></div>
        <button class="home-btn" onclick="location.href='index.html'">🏠 홈</button>
    </div>

    <div id="stage"></div>

    <!-- 빈 상태 -->
    <div id="emptyState">
        <div class="empty-emoji">🌌</div>
        <h2>아직 외계인이 없어요</h2>
        <p>게임을 플레이해서<br>이상형 외계인을 찾아보세요!</p>
        <button class="play-btn" onclick="location.href='index.html'">🎯 게임 시작하기</button>
    </div>

    <!-- 정보 패널 -->
    <div class="info-panel" id="infoPanel">
        <div class="info-char" id="infoChar"></div>
        <div class="info-text">
            <h3 id="infoName">이름</h3>
            <p id="infoDate">수집일</p>
        </div>
        <button class="info-close" onclick="closeInfo()">닫기</button>
    </div>

    <script>
        const COLORS = ['#ffd2d2','#c1e2bd','#bcdff1','#a0a0a0','#b1bf62','#ebebeb','#91b5e8','#ffe39c','#c3eada','#edff59','#ffc4c4'];

        let aliens  = [];
        let stageEl = null;
        let selectedAlien = null;

        // 컬렉션에서 유전자 추출 (포맷 호환)
        function getGenes(item) {
            if (item.baby && item.baby.body !== undefined) return item.baby;        // { baby: genes }
            if (item.baby && item.baby.genes)              return item.baby.genes;  // { baby: { genes } }
            if (item.genes)                                return item.genes;
            return null;
        }
        function getName(item) {
            return item.name || (item.baby && item.baby.name) || '이름 없음';
        }
        function getDate(item) {
            return item.date ? new Date(item.date).toLocaleDateString('ko-KR') : '';
        }

        class WalkingAlien {
            constructor(data) {
                this.genes = getGenes(data);
                this.name  = getName(data);
                this.date  = getDate(data);
                if (!this.genes) return;

                const W = stageEl.clientWidth  - 80;
                const H = stageEl.clientHeight - 100;
                this.x = Math.random() * W;
                this.y = Math.random() * H;

                const speed = 0.4 + Math.random() * 0.8;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.wanderCount = Math.floor(Math.random() * 200) + 80;
                this.dur   = (1.8 + Math.random() * 1.2).toFixed(1);
                this.delay = (Math.random() * 2).toFixed(1);

                this.el = this.createEl();
            }

            createEl() {
                const g     = this.genes;
                const color = COLORS[g.color];
                const el    = document.createElement('div');
                el.className = 'walking-alien';
                el.style.cssText = `left:${this.x}px; top:${this.y}px;`;
                el.innerHTML = `
                    <div class="alien-body-wrap">
                        <div class="alien-float" style="--dur:${this.dur}s; --delay:${this.delay}s;">
                            <div class="char-stage">
                                <div class="part c-body" style="-webkit-mask-image:url('images/body_${g.body}.png');mask-image:url('images/body_${g.body}.png');background-color:${color};"></div>
                                <div class="part c-head" style="-webkit-mask-image:url('images/head_${g.head}.png');mask-image:url('images/head_${g.head}.png');background-color:${color};"></div>
                                <img src="images/eyes_${g.eyes}.png" class="part c-eyes">
                            </div>
                        </div>
                    </div>
                    <div class="alien-label">${this.name}</div>`;
                el.addEventListener('click', () => this.showInfo());
                stageEl.appendChild(el);
                return el;
            }

            update() {
                const W = stageEl.clientWidth  - 80;
                const H = stageEl.clientHeight - 100;

                this.x += this.vx;
                this.y += this.vy;

                if (this.x <= 0)  { this.x = 0;  this.vx =  Math.abs(this.vx); }
                if (this.x >= W)  { this.x = W;  this.vx = -Math.abs(this.vx); }
                if (this.y <= 0)  { this.y = 0;  this.vy =  Math.abs(this.vy); }
                if (this.y >= H)  { this.y = H;  this.vy = -Math.abs(this.vy); }

                // 가끔 방향 바꾸기
                this.wanderCount--;
                if (this.wanderCount <= 0) {
                    this.wanderCount = Math.floor(Math.random() * 200) + 80;
                    const speed = 0.4 + Math.random() * 0.8;
                    const angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                }

                this.el.style.left = this.x + 'px';
                this.el.style.top  = this.y + 'px';

                // 좌우 반전
                const wrap = this.el.querySelector('.alien-body-wrap');
                if (wrap) wrap.style.transform = `scaleX(${this.vx >= 0 ? 1 : -1})`;
            }

            showInfo() {
                // 강조
                document.querySelectorAll('.walking-alien').forEach(e => e.classList.remove('selected'));
                this.el.classList.add('selected');
                selectedAlien = this;

                // 캐릭터 렌더
                const g     = this.genes;
                const color = COLORS[g.color];
                document.getElementById('infoChar').innerHTML = `
                    <div class="part c-body" style="-webkit-mask-image:url('images/body_${g.body}.png');mask-image:url('images/body_${g.body}.png');background-color:${color};"></div>
                    <div class="part c-head" style="-webkit-mask-image:url('images/head_${g.head}.png');mask-image:url('images/head_${g.head}.png');background-color:${color};"></div>
                    <img src="images/eyes_${g.eyes}.png" class="part c-eyes">`;

                document.getElementById('infoName').textContent = this.name;
                document.getElementById('infoDate').textContent = this.date ? `수집일: ${this.date}` : '';
                document.getElementById('infoPanel').classList.add('open');
            }
        }

        function closeInfo() {
            document.getElementById('infoPanel').classList.remove('open');
            document.querySelectorAll('.walking-alien').forEach(e => e.classList.remove('selected'));
            selectedAlien = null;
        }

        function loop() {
            aliens.forEach(a => a.update());
            requestAnimationFrame(loop);
        }

        window.onload = function() {
            stageEl = document.getElementById('stage');
            const collection = JSON.parse(localStorage.getItem('jinmix_collection') || '[]');

            if (collection.length === 0) {
                document.getElementById('emptyState').style.display = 'flex';
                return;
            }

            document.getElementById('headerCount').textContent = `총 ${collection.length}마리`;

            collection.forEach(data => {
                const a = new WalkingAlien(data);
                if (a.genes) aliens.push(a);
            });

            requestAnimationFrame(loop);
        };

        // 무대 클릭 시 패널 닫기
        document.getElementById('stage').addEventListener('click', e => {
            if (!e.target.closest('.walking-alien')) closeInfo();
        });
    </script>
</body>
</html>
