<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진믹스</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; height: 100dvh; overflow: hidden; }
        body {
            font-family: Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #81c784, #43a047);
        }
        .container {
            background: white; border-radius: 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.28);
            max-width: 400px; width: 90%;
            padding: 28px 24px;
            display: flex; flex-direction: column; gap: 14px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

        .title { font-size: 28px; font-weight: bold; color: #1a1a1a; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .subtitle { font-size: 14px; color: #666; text-align: center; line-height: 1.5; }

        .preview-box {
            background: linear-gradient(135deg, #f1f8e9, #e8f5e9);
            border: 2px solid #a5d6a7; border-radius: 12px;
            padding: 12px 14px; display: flex; align-items: center; gap: 10px;
        }
        .req-icon { font-size: 28px; flex-shrink: 0; }
        .req-bubble { background: white; border: 1.5px solid #c8e6c9; border-radius: 10px 10px 10px 3px; padding: 8px 10px; font-size: 13px; color: #333; line-height: 1.5; flex: 1; }
        .req-bubble strong { color: #1F7A4D; }

        .rules { background: #f8f9fa; padding: 14px; border-radius: 12px; }
        .rules h3 { font-size: 13px; color: #43a047; text-align: center; margin-bottom: 10px; }
        .rule { padding-left: 16px; position: relative; font-size: 13px; color: #444; line-height: 1.5; margin-bottom: 6px; }
        .rule::before { content: "•"; position: absolute; left: 4px; color: #66bb6a; }
        .rule:last-child { margin-bottom: 0; }
        .hl { color: #1F7A4D; font-weight: bold; }

        .start-btn {
            padding: 14px; font-size: 16px; font-weight: bold; color: white;
            background: linear-gradient(135deg, #66bb6a, #43a047);
            border: none; border-radius: 12px; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(67,160,71,0.4); }

        .collection-btn {
            padding: 11px; font-size: 14px; font-weight: bold; color: #1F7A4D;
            background: white; border: 2px solid #a5d6a7; border-radius: 12px; cursor: pointer;
            transition: all 0.15s;
        }
        .collection-btn:hover { background: #e8f5e9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Two%20hearts/3D/two_hearts_3d.png" width="34">
            진믹스
        </div>
        <div class="subtitle">랜덤 이상형 외계인의 조건을<br>10번 안에 맞춰보세요! 👽</div>

        <div class="preview-box">
            <div class="req-icon">👽</div>
            <div class="req-bubble">원하는 <strong>2가지 조건</strong>을 알려드릴게요.<br>그 조건에 딱 맞는 아가를 만들어주세요!</div>
        </div>

        <div class="rules">
            <h3>🎮 게임 룰</h3>
            <div class="rule">게임 시작 시 <span class="hl">랜덤 조건</span> 2가지가 공개돼요</div>
            <div class="rule">배우자를 골라 아가를 교배해요</div>
            <div class="rule"><span class="hl">조건 2가지를 모두 충족</span>하면 성공!</div>
            <div class="rule">기회는 <span class="hl">딱 10번</span>뿐이에요</div>
        </div>

        <button class="start-btn" onclick="location.href='game.html'">🎯 이상형 찾기 시작!</button>
        <button class="collection-btn" onclick="location.href='collection.html'">🐾 내 외계인 컬렉션 보기 <span id="collCount"></span></button>
    </div>
    <script>
        const coll = JSON.parse(localStorage.getItem('jinmix_collection') || '[]');
        if (coll.length > 0) document.getElementById('collCount').textContent = `(${coll.length}마리)`;
    </script>
</body>
</html>
