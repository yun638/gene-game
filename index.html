<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진믹스 - 이상형을 찾아라!</title>
    <style>
        body { font-family:'Noto Sans KR',Arial,sans-serif; margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#81c784,#43a047); }
        .landing-container { background:white; padding:36px 28px; border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,0.28); max-width:420px; width:90%; text-align:center; animation:fadeIn 0.55s ease-out; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        .title { font-size:32px; font-weight:bold; color:#1a1a1a; margin-bottom:6px; display:flex; align-items:center; justify-content:center; gap:10px; }
        .subtitle { font-size:15px; color:#666; margin-bottom:28px; line-height:1.6; }
        .requester-preview { background:linear-gradient(135deg,#f1f8e9,#e8f5e9); border:2px solid #a5d6a7; border-radius:14px; padding:16px; margin-bottom:24px; display:flex; align-items:center; gap:12px; text-align:left; }
        .req-icon { font-size:34px; flex-shrink:0; }
        .req-bubble { background:white; border:1.5px solid #c8e6c9; border-radius:12px 12px 12px 4px; padding:9px 12px; font-size:13px; color:#333; line-height:1.6; flex:1; }
        .req-bubble strong { color:#1F7A4D; }
        .rules { background:#f8f9fa; padding:20px; border-radius:14px; margin-bottom:24px; text-align:left; }
        .rules h3 { margin:0 0 13px; font-size:14px; color:#43a047; text-align:center; }
        .rule-item { margin:10px 0; padding-left:22px; position:relative; font-size:14px; color:#444; line-height:1.55; }
        .rule-item::before { content:"•"; position:absolute; left:6px; color:#66bb6a; font-size:18px; }
        .rule-item .hl { color:#1F7A4D; font-weight:bold; }
        .input-section { margin-bottom:16px; }
        .input-section label { display:block; font-size:13px; color:#666; margin-bottom:7px; text-align:left; }
        .input-section input { width:100%; padding:11px 13px; font-size:15px; border:2px solid #ddd; border-radius:8px; box-sizing:border-box; transition:border-color 0.25s; }
        .input-section input:focus { outline:none; border-color:#66bb6a; }
        .start-btn { width:100%; padding:14px; font-size:17px; font-weight:bold; color:white; background:linear-gradient(135deg,#66bb6a,#43a047); border:none; border-radius:11px; cursor:pointer; transition:transform 0.18s,box-shadow 0.18s; }
        .start-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(67,160,71,0.38); }
        .collection-btn { width:100%; padding:11px; font-size:14px; font-weight:bold; color:#1F7A4D; background:white; border:2px solid #a5d6a7; border-radius:11px; cursor:pointer; margin-top:10px; transition:all 0.18s; }
        .collection-btn:hover { background:#e8f5e9; }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="title">
            <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Two%20hearts/3D/two_hearts_3d.png" width="38">
            진믹스
        </div>
        <div class="subtitle">랜덤 이상형 외계인의 조건을<br>10번 안에 맞춰보세요! 👽</div>

        <div class="requester-preview">
            <div class="req-icon">👽</div>
            <div class="req-bubble">게임이 시작되면 제가 원하는<br><strong>2가지 조건</strong>을 알려드릴게요.<br>그 조건에 딱 맞는 아가를 만들어주세요!</div>
        </div>

        <div class="rules">
            <h3>🎮 게임 룰</h3>
            <div class="rule-item">게임 시작 시 <span class="hl">랜덤 이상형 조건</span> 2가지가 공개돼요</div>
            <div class="rule-item">배우자를 골라 아가를 교배해요</div>
            <div class="rule-item"><span class="hl">조건 2가지를 모두 충족</span>하면 성공!</div>
            <div class="rule-item">기회는 <span class="hl">딱 10번</span>뿐이에요</div>
        </div>

        <div class="input-section">
            <label for="userName">플레이어 이름을 입력해주세요</label>
            <input type="text" id="userName" placeholder="예: 홍길동" maxlength="10">
        </div>

        <button class="start-btn" onclick="startGame()">🎯 이상형 찾기 시작!</button>
        <button class="collection-btn" onclick="location.href='collection.html'">🐾 내 외계인 컬렉션 보기</button>
    </div>
    <script>
        document.getElementById('userName').addEventListener('keypress', e => { if(e.key==='Enter') startGame(); });
        function startGame() {
            const name = document.getElementById('userName').value.trim();
            if (!name) { alert('이름을 입력해주세요! 😊'); document.getElementById('userName').focus(); return; }
            localStorage.setItem('jinmix_userName', name);
            localStorage.removeItem('jinmix_gameData');
            location.href='game.html';
        }
    </script>
</body>
</html>
