<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진믹스</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; height: 100dvh; overflow: hidden; }
        body { font-family: Arial, sans-serif; background: #e0e0e0; display: flex; align-items: center; justify-content: center; }
        .container { background: white; width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; padding: 8px; gap: 6px; overflow: hidden; }

        /* ─── 목표 카드 ─── */
        .target-card { flex-shrink: 0; background: linear-gradient(135deg,#f1f8e9,#e8f5e9); border: 2px solid #66bb6a; border-radius: 12px; padding: 8px 10px; }
        .target-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .target-label { font-size: 12px; font-weight: bold; color: #1F7A4D; }
        .turn-badge { background: #1F7A4D; color: white; padding: 2px 9px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .turn-badge.urgent { background: #e53935; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.7} }

        .target-body { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

        .requester-char { width: 48px; height: 48px; position: relative; flex-shrink: 0; }
        .requester-char .part { position: absolute; top:0; left:0; width:100%; height:100%; }
        .requester-char .body, .requester-char .head { -webkit-mask-size:contain;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:contain;mask-repeat:no-repeat;mask-position:center;z-index:1; }
        .requester-char .head { z-index:2; }
        .requester-char .eyes { z-index:3; object-fit:contain; }

        .speech-bubble { background: white; border: 1.5px solid #a5d6a7; border-radius: 8px 8px 8px 3px; padding: 5px 8px; flex: 1; font-size: 12px; color: #333; line-height: 1.5; }

        /* 조건 쇼케이스 (크게 표시) */
        .trait-showcase { display: flex; gap: 7px; }
        .ts-box { flex: 1; background: white; border: 2px solid #ddd; border-radius: 10px; padding: 6px 4px; text-align: center; transition: all 0.3s; }
        .ts-box.matched     { border-color: #66bb6a; background: #e8f5e9; }
        .ts-box.not-matched { border-color: #ef9a9a; background: #fff3f3; }
        .ts-visual { display: flex; align-items: center; justify-content: center; height: 46px; }
        .ts-label  { font-size: 11px; color: #888; margin-top: 2px; }
        .ts-status { font-size: 13px; font-weight: bold; line-height: 1; margin-top: 1px; }
        .ts-status.ok   { color: #1F7A4D; }
        .ts-status.fail { color: #e53935; }

        /* 진행 */
        .progress-row { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
        .turn-text { font-size: 11px; color: #888; white-space: nowrap; }
        .progress-line { flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 2px; background: #66bb6a; transition: width 0.3s; }
        .progress-fill.urgent { background: #ef9a9a; }

        /* ─── 내 캐릭터 ─── */
        .my-char-section { flex-shrink: 0; text-align: center; padding: 6px 8px; background: #f9f9f9; border-radius: 10px; }
        .name-row { font-size: 13px; font-weight: bold; cursor: pointer; color: #2e7d32; margin-bottom: 4px; }
        .characters-row { display: flex; align-items: center; justify-content: center; gap: 8px; }

        .character-container { position: relative; width: 65px; height: 65px; background: transparent; }
        .part { position: absolute; top:0; left:0; width:100%; height:100%; }
        .body, .head { -webkit-mask-size:contain;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:contain;mask-repeat:no-repeat;mask-position:center;z-index:1; }
        .head { z-index:2; }
        .eyes { z-index:3; object-fit:contain; }

        .selected-partner-wrap { position: relative; width: 65px; height: 65px; border: 2px dashed #1F7A4D; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: transparent; }

        .match-status-row { display: flex; gap: 5px; justify-content: center; margin-top: 4px; }
        .match-chip { font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd; background: #f0f0f0; color: #999; }
        .match-chip.ok   { background: #e8f5e9; color: #1F7A4D; border-color: #a5d6a7; font-weight: bold; }
        .match-chip.fail { background: #fff3f3; color: #e53935; border-color: #ef9a9a; }

        /* ─── 배우자 ─── */
        .partners-section { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 5px; }
        .partners-header { flex-shrink: 0; font-size: 13px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 5px; }
        .partners-grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .partner-card { border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: all 0.15s; }
        .partner-card.selected { border-color: #1F7A4D; background: #f1f8f4; }
        .partner-container { position: relative; width: 56px; height: 56px; background: transparent; flex-shrink: 0; }
        .partner-label { font-size: 10px; color: #888; }

        .breed-btn { flex-shrink: 0; padding: 9px; background: #1F7A4D; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: bold; }
        .breed-btn:disabled { background: #ccc; cursor: not-allowed; }

        #loadingOverlay { display: flex; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.93); z-index:2000; align-items:center; justify-content:center; font-size:20px; }
    </style>
</head>
<body>
    <div id="loadingOverlay">🔄 로딩 중...</div>
    <div class="container">

        <!-- 🎯 목표 카드 -->
        <div class="target-card">
            <div class="target-header">
                <div class="target-label">🚀 수출 조건</div>
                <div class="turn-badge" id="turnBadge">남은 턴: 10</div>
            </div>
            <div class="target-body">
                <div class="requester-char" id="requesterChar"></div>
                <div class="speech-bubble" id="speechBubble">로딩 중...</div>
            </div>
            <div class="trait-showcase" id="traitShowcase"></div>
            <div class="progress-row">
                <div class="turn-text" id="turnText">0 / 10</div>
                <div class="progress-line"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            </div>
        </div>

        <!-- 👶 내 캐릭터 -->
        <div class="my-char-section">
            <div class="name-row" id="nameDisplay" onclick="changeName()">아가1 · 세대 1</div>
            <div class="characters-row">
                <div class="character-container">
                    <div class="part body" id="myBodyPart"></div>
                    <div class="part head" id="myHeadPart"></div>
                    <img class="part eyes" id="myEyesPart">
                </div>
                <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Two%20hearts/3D/two_hearts_3d.png" width="28">
                <div class="selected-partner-wrap" id="selectedPartnerDisplay">
                    <span style="color:#bbb;font-size:11px;text-align:center;line-height:1.4;">배우자<br>미선택</span>
                </div>
            </div>
            <div class="match-status-row" id="matchStatusRow" style="display:none;"></div>
        </div>

        <!-- 💑 배우자 선택 -->
        <div class="partners-section">
            <div class="partners-header">
                <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Yellow%20heart/3D/yellow_heart_3d.png" width="16">
                배우자 후보
            </div>
            <div class="partners-grid" id="partnersGrid"></div>
            <button class="breed-btn" id="breedButton" onclick="breed()" disabled>👶 교배하기</button>
        </div>
    </div>

    <script>
        const GENE_CONFIG = { body:{folder:'images',prefix:'body_',count:null}, head:{folder:'images',prefix:'head_',count:null}, eyes:{folder:'images',prefix:'eyes_',count:null} };
        const COLORS = ['#ffd2d2','#c1e2bd','#bcdff1','#a0a0a0','#b1bf62','#ebebeb','#91b5e8','#ffe39c','#c3eada','#edff59','#ffc4c4'];
        const TRAIT_NAMES = { body:'몸', head:'머리', eyes:'눈', color:'색깔' };
        let GENES = {};
        let myGenes={}, myName="아가1", generation=1, babyCounter=2;
        let familyTree=[], partners=[], selectedPartnerIndex=null;
        let inheritanceStats={body:{},head:{},eyes:{},color:{}};
        let targetGenes={}, targetTraits=[], requesterGenes={}, dialogueType=0;
        const MAX_TURNS=10; let turnCount=0;

        async function detectImageCount(folder,prefix) {
            let c=0;
            while(true){ try{ const r=await fetch(`${folder}/${prefix}${c}.png`,{method:'HEAD'}); if(r.ok)c++; else break; }catch{break;} }
            return c;
        }
        async function initializeGenes() {
            for(const[part,cfg]of Object.entries(GENE_CONFIG)){ cfg.count=await detectImageCount(cfg.folder,cfg.prefix); GENES[part]=Array.from({length:cfg.count},(_,i)=>`${cfg.folder}/${cfg.prefix}${i}.png`); }
            GENE_CONFIG.color={count:COLORS.length};
        }
        function generateTarget() {
            targetGenes=randomGenes(); requesterGenes=randomGenes();
            const pool=['body','head','eyes','color'];
            for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
            targetTraits=pool.slice(0,2); dialogueType=Math.floor(Math.random()*2);
        }
        function displayRequester() {
            const el=document.getElementById('requesterChar'), color=COLORS[requesterGenes.color];
            el.innerHTML=`<div class="part body" style="-webkit-mask-image:url('${GENES.body[requesterGenes.body]}');mask-image:url('${GENES.body[requesterGenes.body]}');background-color:${color};"></div>
                          <div class="part head" style="-webkit-mask-image:url('${GENES.head[requesterGenes.head]}');mask-image:url('${GENES.head[requesterGenes.head]}');background-color:${color};"></div>
                          <img src="${GENES.eyes[requesterGenes.eyes]}" class="part eyes">`;
        }
        function traitVisual(trait,value,size=22) {
            if(trait==='eyes') return `<img src="images/eyes_${value}.png" style="width:${size}px;height:${size}px;object-fit:contain;vertical-align:middle;border-radius:3px;">`;
            if(trait==='color') return `<span style="display:inline-block;width:${size}px;height:${size}px;background:${COLORS[value]};border-radius:50%;border:2px solid rgba(0,0,0,0.1);vertical-align:middle;"></span>`;
            return `<span style="display:inline-block;width:${size}px;height:${size}px;-webkit-mask-image:url('images/${trait}_${value}.png');mask-image:url('images/${trait}_${value}.png');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;background-color:#1F7A4D;vertical-align:middle;"></span>`;
        }
        function updateTargetUI() {
            const n1=TRAIT_NAMES[targetTraits[0]], n2=TRAIT_NAMES[targetTraits[1]];
            document.getElementById('speechBubble').innerHTML = dialogueType===0
                ? `<strong>${n1}</strong>과 <strong>${n2}</strong>을 갖춘 외계인을 지구로 수출하고 싶어요!`
                : `<strong>${n1}</strong>과 <strong>${n2}</strong>이면 지구 수출 OK! 교배해주세요 🚀`;

            const showcaseHTML=targetTraits.map(t=>{
                const vis=traitVisual(t,targetGenes[t],42);
                const first=generation>1, matched=first&&myGenes[t]===targetGenes[t];
                const cls=!first?'':(matched?'matched':'not-matched');
                const status=!first?'':`<div class="ts-status ${matched?'ok':'fail'}">${matched?'✓':'✗'}</div>`;
                return `<div class="ts-box ${cls}"><div class="ts-visual">${vis}</div><div class="ts-label">${TRAIT_NAMES[t]}</div>${status}</div>`;
            }).join('');
            document.getElementById('traitShowcase').innerHTML=showcaseHTML;

            const rem=MAX_TURNS-turnCount;
            const badge=document.getElementById('turnBadge');
            badge.textContent=`남은 턴: ${rem}`; badge.className='turn-badge'+(rem<=3?' urgent':'');
            document.getElementById('turnText').textContent=`${turnCount} / ${MAX_TURNS}`;
            const pct=(turnCount/MAX_TURNS*100).toFixed(0);
            const fill=document.getElementById('progressFill');
            fill.style.width=pct+'%'; fill.className='progress-fill'+(turnCount>=7?' urgent':'');
        }
        function updateMatchStatus() {
            if(generation===1){document.getElementById('matchStatusRow').innerHTML='';return;}
            document.getElementById('matchStatusRow').innerHTML=targetTraits.map(t=>{
                const ok=myGenes[t]===targetGenes[t];
                return `<span class="match-chip ${ok?'ok':'fail'}">${TRAIT_NAMES[t]} ${ok?'✓':'✗'}</span>`;
            }).join('');
        }
        window.onload=async function(){
            try{
                await initializeGenes(); generateTarget();
                myGenes=randomGenes();
                familyTree.push({name:myName,genes:{...myGenes},generation:1,parents:null});
                displayMyCharacter(); displayRequester(); updateTargetUI(); updateMatchStatus(); generatePartners();
                document.getElementById('loadingOverlay').style.display='none';
            }catch(e){console.error(e);alert('❌ 초기화 실패. images 폴더를 확인하세요.');}
        };
        function displayMyCharacter() {
            const color=COLORS[myGenes.color];
            const body=document.getElementById('myBodyPart');
            body.style.webkitMaskImage=`url('${GENES.body[myGenes.body]}')`; body.style.maskImage=`url('${GENES.body[myGenes.body]}')`; body.style.backgroundColor=color;
            const head=document.getElementById('myHeadPart');
            head.style.webkitMaskImage=`url('${GENES.head[myGenes.head]}')`; head.style.maskImage=`url('${GENES.head[myGenes.head]}')`; head.style.backgroundColor=color;
            document.getElementById('myEyesPart').src=GENES.eyes[myGenes.eyes];
            document.getElementById('nameDisplay').textContent=`${myName} · 세대 ${generation}`;
        }
        function getCharacterHTML(genes) {
            const c=COLORS[genes.color];
            return `<div class="part body" style="-webkit-mask-image:url('${GENES.body[genes.body]}');mask-image:url('${GENES.body[genes.body]}');background-color:${c};"></div>
                    <div class="part head" style="-webkit-mask-image:url('${GENES.head[genes.head]}');mask-image:url('${GENES.head[genes.head]}');background-color:${c};"></div>
                    <img src="${GENES.eyes[genes.eyes]}" class="part eyes">`;
        }
        function checkMatch(genes){return targetTraits.every(t=>genes[t]===targetGenes[t]);}
        function breed(){
            if(selectedPartnerIndex===null){alert('❌ 배우자를 먼저 선택해주세요!');return;}
            const pGenes=partners[selectedPartnerIndex];
            const cur=familyTree[familyTree.length-1];
            const gp=cur.parents?[cur.parents.p1.genes,cur.parents.p2.genes]:null;
            let ggp=null; if(familyTree.length>=2){const pg=familyTree[familyTree.length-2];if(pg.parents)ggp=[pg.parents.p1.genes,pg.parents.p2.genes];}
            const childGenes={},msgs=[];
            ['body','head','eyes','color'].forEach(part=>{
                const maxVal=part==='color'?GENE_CONFIG.color.count:GENE_CONFIG[part].count, r=Math.random()*100;
                if(r<88){ childGenes[part]=Math.random()<0.5?myGenes[part]:pGenes[part]; }
                else if(r<94&&gp){ childGenes[part]=gp[Math.floor(Math.random()*2)][part]; if(childGenes[part]!==myGenes[part]&&childGenes[part]!==pGenes[part])msgs.push(`👴👵 할아버지 할머니의 ${TRAIT_NAMES[part]} 유전!`); }
                else if(r<96&&ggp){ childGenes[part]=ggp[Math.floor(Math.random()*2)][part]; if(childGenes[part]!==myGenes[part]&&childGenes[part]!==pGenes[part])msgs.push(`👵👴 증조부모의 ${TRAIT_NAMES[part]} 유전!`); }
                else if(r<97){ let gggp=null; if(familyTree.length>=3){const g3=familyTree[familyTree.length-3];if(g3.parents)gggp=[g3.parents.p1.genes,g3.parents.p2.genes];} if(gggp){childGenes[part]=gggp[Math.floor(Math.random()*2)][part];if(childGenes[part]!==myGenes[part]&&childGenes[part]!==pGenes[part])msgs.push(`🎩 고조부모의 ${TRAIT_NAMES[part]} 유전!`);}else{childGenes[part]=Math.floor(Math.random()*maxVal);if(childGenes[part]!==myGenes[part]&&childGenes[part]!==pGenes[part])msgs.push(`✨ ${TRAIT_NAMES[part]} 돌연변이!`);} }
                else{ childGenes[part]=Math.floor(Math.random()*maxVal); if(childGenes[part]!==myGenes[part]&&childGenes[part]!==pGenes[part])msgs.push(`✨ ${TRAIT_NAMES[part]} 돌연변이!`); }
                inheritanceStats[part][childGenes[part]]=(inheritanceStats[part][childGenes[part]]||0)+1;
            });
            const oldName=myName,oldGenes={...myGenes};
            myGenes=childGenes; myName=`아가${babyCounter++}`; generation++; turnCount++;
            familyTree.push({name:myName,genes:{...myGenes},generation,parents:{p1:{name:oldName,genes:oldGenes},p2:{name:'배우자',genes:{...pGenes}}}});
            const isMatch=checkMatch(myGenes),isLast=turnCount>=MAX_TURNS;
            if(isMatch||isLast){
                localStorage.setItem('jinmix_gameData',JSON.stringify({targetGenes,targetTraits,dialogueType,requesterGenes,finalGenes:{...myGenes},finalName:myName,success:isMatch,successTurn:isMatch?turnCount:null,totalTurns:turnCount,familyTree,inheritanceStats}));
                if(msgs.length)alert([...new Set(msgs)].join('\n'));
                alert(isMatch?`🎉 ${turnCount}번째 시도에 성공!`:'😢 10턴이 모두 끝났어요...');
                window.location.href='result.html'; return;
            }
            if(msgs.length)alert([...new Set(msgs)].join('\n'));
            displayMyCharacter(); updateTargetUI(); updateMatchStatus(); generatePartners();
        }
        function generatePartners(){
            partners=Array.from({length:4},()=>randomGenes()); selectedPartnerIndex=null;
            const grid=document.getElementById('partnersGrid'); grid.innerHTML='';
            document.getElementById('breedButton').disabled=true;
            document.getElementById('selectedPartnerDisplay').innerHTML='<span style="color:#bbb;font-size:11px;text-align:center;line-height:1.4;">배우자<br>미선택</span>';
            partners.forEach((p,i)=>{
                const card=document.createElement('div'); card.className='partner-card';
                card.onclick=()=>{ selectedPartnerIndex=i; document.getElementById('selectedPartnerDisplay').innerHTML=getCharacterHTML(partners[i]); document.getElementById('breedButton').disabled=false; document.querySelectorAll('.partner-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); };
                card.innerHTML=`<div class="partner-container">${getCharacterHTML(p)}</div><div class="partner-label">후보 ${i+1}</div>`;
                grid.appendChild(card);
            });
        }
        function randomGenes(){return{body:Math.floor(Math.random()*GENE_CONFIG.body.count),head:Math.floor(Math.random()*GENE_CONFIG.head.count),eyes:Math.floor(Math.random()*GENE_CONFIG.eyes.count),color:Math.floor(Math.random()*GENE_CONFIG.color.count)};}
        function changeName(){const n=prompt('이름을 입력하세요',myName);if(n){myName=n;familyTree[familyTree.length-1].name=n;displayMyCharacter();}}
    </script>
</body>
</html>
